<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- MINIATURA / PREVIEW -->
    <meta property="og:title" content="Quizzes EBD Fiel - Jovens">
    <meta property="og:description" content="Teste seu conhecimento bíblico com quizzes interativos.">
    <meta property="og:image" content="https://i.imgur.com/nP5W1wP.png">
    <meta property="og:type" content="website">

    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:image" content="https://i.imgur.com/nP5W1wP.png">

    <title>Quizzes da EBD Fiel - Classe Jovens</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* Mantive seu estilo já atualizado */
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #07051f, #17113d);
            color: white;
            padding: 20px;
        }

        .container {
            max-width: 1100px;
            margin: auto;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo-img {
            width: 120px;
            cursor: pointer;
        }

        .hero-pills {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        .hero-pill {
            background: linear-gradient(145deg, #00e5ff, #ec4899);
            padding: 8px 14px;
            border-radius: 20px;
            font-weight: 600;
        }

        .btn-quiz {
            display: block;
            text-align: center;
            padding: 10px;
            border-radius: 20px;
            background: linear-gradient(145deg, #00e5ff, #2563eb);
            margin-top: 10px;
            text-decoration: none;
            color: white;
        }

        .btn-quiz.disabled {
            background: #555;
            pointer-events: none;
        }
    </style>
</head>

<body>

<div class="container">

<header>
    <img src="https://i.imgur.com/vsNu5IC.png" class="logo-img" id="logoImg">

    <img src="https://i.imgur.com/SAWFwQE.png" style="max-width:260px; margin:20px auto; display:block;">

    <div class="hero-pills">
        <span class="hero-pill">⚡ Novos quizzes toda semana</span>
        <span class="hero-pill">🎯 Desafie seu conhecimento</span>
        <span class="hero-pill">🧠 Aprenda de forma interativa</span>
    </div>
</header>

<main id="trimestres-container"></main>

</div>

<script>

const trimestres = [
    {
        numero: 2,
        titulo: "2º Trimestre 2026",
        videoId: "uCCysCorUok",
        lessons: [
            { num: 1, title: "Lição exemplo", date: "05/04/2026", releaseDate: new Date(2026,3,3) }
        ]
    }
];

function getKeys(t,l){
    return {
        force:`force_${t}_${l}`,
        block:`block_${t}_${l}`
    }
}

function isAvailable(t,l,date){
    const today = new Date();
    today.setHours(0,0,0,0);

    const k = getKeys(t,l);

    if(localStorage.getItem(k.block)==='true') return false;
    if(localStorage.getItem(k.force)==='true') return true;

    return today >= date;
}

function render(){
    const c = document.getElementById('trimestres-container');
    c.innerHTML='';

    trimestres.forEach(t=>{
        const div=document.createElement('div');
        div.innerHTML=`<h2>${t.titulo}</h2>`;

        t.lessons.forEach(l=>{
            const available=isAvailable(t.numero,l.num,l.releaseDate);

            const el=document.createElement('div');
            el.innerHTML=`
                <p>${l.title}</p>
                <a class="btn-quiz ${!available?'disabled':''}" href="#">
                    ${available?'Iniciar Quiz':'Em preparação'}
                </a>
            `;
            div.appendChild(el);
        });

        c.appendChild(div);
    });
}

render();

// ADMIN
let clicks=0;
document.getElementById('logoImg').onclick=()=>{
    clicks++;
    if(clicks>=5){
        const t=prompt('Trimestre?');
        const l=prompt('Lição?');
        const acao=prompt('liberar / bloquear / reset');

        const k=getKeys(t,l);

        if(acao==='liberar'){
            localStorage.setItem(k.force,'true');
            localStorage.removeItem(k.block);
        }

        if(acao==='bloquear'){
            localStorage.setItem(k.block,'true');
            localStorage.removeItem(k.force);
        }

        if(acao==='reset'){
            localStorage.removeItem(k.force);
            localStorage.removeItem(k.block);
        }

        location.reload();
    }
    setTimeout(()=>clicks=0,2000);
}

</script>

</body>
</html>
